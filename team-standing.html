<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Standing | Basketball League 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="standing" class="min-h-screen antialiased">
  <header class="league-nav">
    <div class="container-main nav-inner">
      <div class="brand-wrap">
        <div class="logo-box">
          <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Basketball.png" alt="Metroville Basketball League logo" onerror="this.onerror=null;this.src='assets/logos/logo.png';" />
          <span class="logo-overlay">MBL</span>
        </div>
        <div class="brand-copy">
          <h1>Metroville Basketball League 2026</h1>
          <p>Official League Portal</p>
        </div>
      </div>
      <nav class="nav-links">
        <a href="index.html" data-link="home">Home</a>
        <a href="game-schedule.html" data-link="schedule">Game Schedule</a>
        <a href="team-standing.html" data-link="standing">Team Standing</a>
        <a href="best-player.html" data-link="players">Best Player</a>
      </nav>
      <div id="todayDate" class="today-date"></div>
    </div>
  </header>

  <main class="container-main page-content relative">
    <section class="content-card standings-shell">
      <div class="section-head">
        <h2 class="section-title">Team Standing</h2>
        <p class="section-subtitle">Updated ranking ng lahat ng teams sa league.</p>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Team</th>
              <th>W</th>
              <th>L</th>
              <th>Win %</th>
            </tr>
          </thead>
          <tbody id="standingsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 Metroville Basketball League • Pro Dashboard</footer>

  <script src="script.js"></script>
</body>
</html>
