<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>League Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main class="auth-shell" id="authShell">
    <section class="auth-card">
      <h1>Admin Login</h1>
      <p>Manage Team Standing, Game Schedule, and Best Player data.</p>
      <form id="loginForm" class="stacked-form">
        <label>
          API Base URL
          <input id="apiBaseInput" type="text" placeholder="https://your-render-service.onrender.com/api" required />
        </label>
        <label>
          Username
          <input id="usernameInput" type="text" placeholder="admin" required />
        </label>
        <label>
          Password
          <input id="passwordInput" type="password" placeholder="Enter password" required />
        </label>
        <button type="submit">Login</button>
      </form>
      <p id="authMessage" class="message"></p>
    </section>
  </main>

  <div class="dashboard hidden" id="dashboard">
    <aside class="sidebar">
      <h2>League Admin</h2>
      <p class="admin-hint" id="adminMeta">Signed in</p>
      <nav class="side-nav" id="sideNav">
        <button data-view="standing" class="active">Team Standing</button>
        <button data-view="schedule">Game Schedule</button>
        <button data-view="players">Best Player</button>
      </nav>
      <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
    </aside>

    <section class="content">
      <header class="content-header">
        <h3 id="viewTitle">Team Standing</h3>
        <button id="refreshBtn" type="button">Refresh</button>
      </header>

      <p id="globalMessage" class="message"></p>

      <div class="view" id="standingView">
        <div class="view-toolbar">
          <button type="button" data-modal-open="team">Add Team</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Team</th><th>W</th><th>L</th><th>Pts</th><th>Actions</th></tr>
            </thead>
            <tbody id="teamsBody"></tbody>
          </table>
        </div>
      </div>

      <div class="view hidden" id="scheduleView">
        <div class="view-toolbar">
          <button type="button" data-modal-open="schedule">Add Game</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Match</th><th>Date</th><th>Time</th><th>Venue</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </div>

      <div class="view hidden" id="playersView">
        <div class="view-toolbar">
          <button type="button" data-modal-open="player">Add Player</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Player</th><th>Team</th><th>PTS</th><th>REB</th><th>AST</th><th>Date</th><th>Actions</th></tr>
            </thead>
            <tbody id="playersBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <div class="modal hidden" id="teamModal" data-modal="team" role="dialog" aria-modal="true" aria-labelledby="teamModalTitle">
    <div class="modal-card">
      <header class="modal-head">
        <h4 id="teamModalTitle">Team Form</h4>
        <button type="button" class="icon-btn" data-modal-close="team">x</button>
      </header>
      <form id="teamForm" class="stacked-form inline-grid">
        <input type="hidden" id="teamId" />
        <label>Team Name <input id="teamName" required /></label>
        <label>Logo URL <input id="teamLogo" placeholder="https://..." /></label>
        <label>
          Upload Logo File
          <input id="teamLogoFile" type="file" accept="image/*" />
          <small class="field-hint">Selecting a file will auto-fill and optimize the logo URL.</small>
        </label>
        <label>Wins <input id="teamWins" type="number" min="0" value="0" required /></label>
        <label>Losses <input id="teamLosses" type="number" min="0" value="0" required /></label>
        <label>Points <input id="teamPoints" type="number" min="0" value="0" required /></label>
        <div class="form-actions">
          <button type="submit">Save Team</button>
          <button type="button" data-reset="team">Clear</button>
          <button type="button" data-modal-close="team">Close</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal hidden" id="scheduleModal" data-modal="schedule" role="dialog" aria-modal="true" aria-labelledby="scheduleModalTitle">
    <div class="modal-card">
      <header class="modal-head">
        <h4 id="scheduleModalTitle">Game Schedule Form</h4>
        <button type="button" class="icon-btn" data-modal-close="schedule">x</button>
      </header>
      <form id="scheduleForm" class="stacked-form inline-grid">
        <input type="hidden" id="scheduleId" />
        <label>
          Team 1
          <select id="scheduleTeam1" required>
            <option value="">Select team</option>
          </select>
        </label>
        <label>
          Team 2
          <select id="scheduleTeam2" required>
            <option value="">Select team</option>
          </select>
        </label>
        <label>Date <input id="scheduleDate" type="date" required /></label>
        <label>Time <input id="scheduleTime" type="time" required /></label>
        <label>Venue <input id="scheduleVenue" required /></label>
        <label>Status <input id="scheduleStatus" value="Upcoming" /></label>
        <div class="form-actions">
          <button type="submit">Save Game</button>
          <button type="button" data-reset="schedule">Clear</button>
          <button type="button" data-modal-close="schedule">Close</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal hidden" id="playerModal" data-modal="player" role="dialog" aria-modal="true" aria-labelledby="playerModalTitle">
    <div class="modal-card">
      <header class="modal-head">
        <h4 id="playerModalTitle">Best Player Form</h4>
        <button type="button" class="icon-btn" data-modal-close="player">x</button>
      </header>
      <form id="playerForm" class="stacked-form inline-grid">
        <input type="hidden" id="playerId" />
        <label>Player Name <input id="playerName" required /></label>
        <label>
          Team
          <select id="playerTeam" required>
            <option value="">Select team</option>
          </select>
        </label>
        <label>Points <input id="playerPoints" type="number" min="0" value="0" required /></label>
        <label>Rebounds <input id="playerRebounds" type="number" min="0" value="0" required /></label>
        <label>Assists <input id="playerAssists" type="number" min="0" value="0" required /></label>
        <label>Game Date <input id="playerGameDate" type="date" required /></label>
        <label>Player Image URL <input id="playerImage" placeholder="https://..." /></label>
        <div class="form-actions">
          <button type="submit">Save Player</button>
          <button type="button" data-reset="player">Clear</button>
          <button type="button" data-modal-close="player">Close</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../client-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="admin.js"></script>
</body>
</html>
